[workspace]
members = ["crates/*"]
default-members = [
    ".",
    "crates/uor-tless",
    "crates/uor-r4-core",
    "crates/uor-r4-router",
    "crates/uor-tless-bindings",
]
exclude = ["uor_standards"]
resolver = "2"

[package]
name = "uor-r4-wasm-router"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "server"
path = "src/main.rs"

[dependencies]
uor-r4-core = { path = "crates/uor-r4-core" }
uor-r4-router = { path = "crates/uor-r4-router" }
uor-tless-bindings = { path = "crates/uor-tless-bindings" }
uor-tless = { path = "crates/uor-tless" }
uor-foundation = { path = "uor_standards/UOR-Framework/foundation", default-features = false, features = ["std", "serde"] }
clap = { version = "4.5", features = ["derive", "env"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
hex = "0.4.3"

