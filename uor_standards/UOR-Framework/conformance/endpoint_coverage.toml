# the fingerprint output width range, the trace event-count ceiling, and
# the algebraic-level bit-width ceiling. The canonical surface is the
# const-generic on Hasher / ContentFingerprint / Trace; the application's
# HostBounds impl populates each type's const-generic at instantiation.
# Foundation exposes no free-standing capacity constants — collapsing the
# substitution axis is exactly what ADR-018 rejects.
[coverage.host_bounds]
symbols = ["HostBounds"]
behavior = "behavior_host_bounds"

# ─── Mapping: PrismModel + FoundationClosed (wiki ADR-019 + ADR-020) ───
# ADR-019 names the categorical structure: foundation as a signature
# endofunctor F, Term as F's initial algebra, pipeline::run as the
# catamorphism, trace as the anamorphism witness, sealed types as fixed
# points. ADR-020 codifies the typed-iso contract as a Rust trait:
# PrismModel carries Input / Output / Route, with Route bound by
# FoundationClosed (the closure-under-foundation-vocabulary check).
# FoundationClosed is sealed via a private super-trait so application
# code cannot bypass the closure check — only foundation itself and the
# `prism_model!` macro from uor-foundation-sdk produce impls.
[coverage.prism_model]
symbols = ["PrismModel", "FoundationClosed"]
behavior = "behavior_prism_model"

# ─── Mapping: IntoBindingValue (wiki ADR-023, amended by ADR-060) ──────
# ADR-023 closes the architectural gap ADR-022 left open: how does an
# `M::Input` value supplied at runtime flow into the `CompileUnit`
# binding table? Foundation declares `IntoBindingValue<'a>` as the trait
# every `M::Input` must implement. ADR-060 makes it source-polymorphic:
# `as_binding_value` returns a `TermValue<'a>` carrier (Inline / Borrowed /
# Stream) with no `MAX_BYTES` ceiling. `pipeline::run_route` folds the
# carrier through the application's selected `Hasher` (chunk-by-chunk for
# `Stream`) to derive the input's content address — arbitrarily large
# inputs flow natively — and constructs a transient `Binding` for the
# route's input slot (`Term::Variable { name_index: 0 }` per ADR-022 D3 G2).
# The trait is sealed via the same `__sdk_seal::Sealed` supertrait as
# `FoundationClosed` and `PrismModel`. Exercised by
# behavior_adr_060_large_input_grounded (a multi-KB Borrowed + multi-MiB
# Stream input flowing through `forward`/`run_route`).
[coverage.into_binding_value]
symbols = ["IntoBindingValue"]
behavior = "behavior_into_binding_value"

# ─── Mapping: catamorphism evaluator (wiki ADR-029) ────────────────────
# ADR-029 specifies that `pipeline::run` actually evaluates the route's
# Term tree as a structural fold with per-variant fold rules. The
# evaluator (`evaluate_term_tree`) produces a `TermValue` (fixed-capacity
# byte buffer) per variant; `pipeline::run_route` populates the
# `Grounded`'s output payload (per ADR-028) with the catamorphism's
# evaluation result. `TERM_VALUE_MAX_BYTES` is the foundation-fixed
# per-value byte ceiling.
[coverage.catamorphism_evaluator]
symbols = ["evaluate_term_tree", "TermValue"]
behavior = "behavior_catamorphism_evaluator"

# ─── Mapping: route output payload (wiki ADR-028 + ADR-060) ────────────
# ADR-028 commits the Grounded<T> to carry the catamorphism's evaluation
# result as an output payload alongside the metadata fingerprint. ADR-060
# replaced the fixed `ROUTE_OUTPUT_BUFFER_BYTES` ceiling with the
# source-polymorphic `TermValue<'a, INLINE_BYTES>` carrier whose inline width
# is derived by `carrier_inline_bytes::<B>()` (the `const fn` snapshot symbol).
# No coverage entry is needed here: the `behavior_route_output_payload` test's
# surface is `Grounded` (covered below) and `carrier_inline_bytes` (the
# `const fn` symbol), both already mapped — adding a stale/duplicate symbol
# here would be the inconsistency this audit guards against.

# ─── Mapping: closure-body grammar fold-unroll (wiki ADR-026 G14) ──────
# ADR-026 G14 specifies the `fold_n` lowering rule: counts at or below
# `pipeline::FOLD_UNROLL_THRESHOLD` unroll into a `Term::Application`
# chain; counts above use `Term::Recurse`. Foundation fixes the
# threshold so two implementations compiling the same closure-body emit
# the same Term tree.
[coverage.fold_unroll_threshold]
symbols = ["FOLD_UNROLL_THRESHOLD"]
behavior = "behavior_fold_unroll_threshold"

# ─── Mapping: ADR-029 anamorphism + recursive fold placeholders ────────
# ADR-029 specifies that `Term::Recurse` and `Term::Unfold` carry their
# bound variables via fresh-name-indexed `Term::Variable` placeholders
# threaded through the catamorphism's evaluator. The two sentinels
# `RECURSE_PLACEHOLDER_NAME_INDEX` and `UNFOLD_PLACEHOLDER_NAME_INDEX`
# encode the recursive-call and unfold-state placeholders in stable-Rust
# 1.83 (no nightly `generic_const_exprs`). `UNFOLD_MAX_ITERATIONS` is the
# foundation-fixed bound on the anamorphic Kleene-fixpoint iteration —
# parallel to `FOLD_UNROLL_THRESHOLD` for the catamorphic recursion path.
[coverage.adr029_placeholders]
symbols = ["RECURSE_PLACEHOLDER_NAME_INDEX", "UNFOLD_PLACEHOLDER_NAME_INDEX", "UNFOLD_MAX_ITERATIONS"]
behavior = "behavior_catamorphism_evaluator"

# ─── Mapping: ADR-030 substitution-axis generalization ─────────────────
# ADR-030 generalizes the substitution-axis "third position" from a
# single `Hasher` to an open `AxisTuple` of substrate-extension axes.
# `AxisExtension` is the per-axis sealed trait; `AxisTuple` is the
# tuple dispatcher; `HashAxis<H>` adapts existing `Hasher` impls.
# `MAX_AXIS_TUPLE_ARITY` is the foundation-fixed bound (ADR-060 removed the
# `AXIS_OUTPUT_BYTES_CEILING` byte cap; axis outputs now ride the
# source-polymorphic `TermValue` carrier). `Term::AxisInvocation` (replaces
# the legacy `HasherProjection`) encodes the route-level axis selection.
[coverage.adr030_axis_extension]
symbols = ["AxisExtension", "AxisTuple", "HashAxis", "MAX_AXIS_TUPLE_ARITY"]
behavior = "behavior_catamorphism_evaluator"

# ─── Mapping: ADR-055 universal substrate-Term verb body discipline ────
