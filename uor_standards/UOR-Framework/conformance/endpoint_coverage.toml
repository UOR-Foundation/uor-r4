# Endpoint-coverage audit: every public symbol in foundation/tests/public-api.snapshot
# is either (a) mapped to a behavior_*.rs test file that exercises its contract,
# or (b) documented here as an exempted category. Unmapped symbols fail the
# `rust/endpoint_coverage` conformance validator.
#
# Each mapping entry: `symbol = "behavior_<name>"` where the named test file
# under foundation/tests/ exists and contains behavioral assertions.
#
# Each exemption declares a category of symbols that don't need a direct
# behavior test because their correctness is either (a) enforced by the
# type system, (b) indirectly exercised by grouped tests, or (c) a
# pure documentation constant.

# ─── Exemption: documentation constants ──────────────────────────────────
# Compile-time constants whose only contract is their literal value. These
# are pinned by the public-api.snapshot and any regression would already
# fail the snapshot diff.
[exempt.documentation_constants]
description = "Pub const values whose contract is the literal — pinned by snapshot"
symbols = [
    "TRACE_REPLAY_FORMAT_VERSION",
    "JACOBIAN_MAX_SITES",
    "MAX_BETTI_DIMENSION",
    "MAX_OP_CHAIN_DEPTH",
    "RECURSION_TRACE_MAX_DEPTH",
    "PREFLIGHT_CHECK_IRIS",
    "REDUCTION_STAGE_IRIS",
    "INHABITANCE_DISPATCH_TABLE",
    # Phase X.4: constraint-nerve chain-complex caps.
    "NERVE_CONSTRAINTS_CAP",
    "NERVE_SITES_CAP",
    "NERVE_C1_MAX",
    "NERVE_C2_MAX",
    # Phase X.2: cohomology dimension cap.
    "MAX_COHOMOLOGY_DIMENSION",
    # v0.2.2 Phase B: shared canonical budget.
    "WITT_MAX_BITS",
    "INTERACTION_DIVERGENCE_BUDGET",
]

# ─── Exemption: sealed supertrait markers ────────────────────────────────
# Sealed traits implemented only inside the foundation. The
# escape_hatch_lint validator enforces that downstream cannot implement
# them; any behavioral contract is indirectly exercised by the concrete
# sealed types that implement them.
[exempt.sealed_supertraits]
