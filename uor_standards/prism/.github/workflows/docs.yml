name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUSTDOCFLAGS: "-D rustdoc::broken_intra_doc_links -D rustdoc::missing_crate_level_docs"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps
      - name: Inject root redirect
        run: |
          cat > target/doc/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>uor-prism docs</title>
          <meta http-equiv="refresh" content="0;url=prism/index.html">
          <link rel="canonical" href="prism/index.html">
          <p>Redirecting to <a href="prism/index.html">prism/index.html</a>.</p>
          HTML
      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
