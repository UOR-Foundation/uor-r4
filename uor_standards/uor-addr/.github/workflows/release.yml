name: Release

# Tag-triggered (v*) release. Job DAG:
#
#   release
#     → publishes uor-addr / uor-addr-c / uor-addr-wasm to crates.io
#     → attaches the wasm component + cbindgen header to the GH Release
#   prebuilt-c   (5-way matrix, depends on release)
#     → builds libuor_addr_c.* for linux-x86_64, linux-aarch64,
#       macos-x86_64, macos-aarch64, windows-x86_64
#     → uploads each prebuilt to the GH Release
#   publish-npm  (depends on release)
#     → builds the WASM Component Model artifact
#     → jco-transpiles into bindings/npm/dist
#     → npm publish under @uor-foundation/uor-addr
#   publish-pypi (5-way matrix, depends on prebuilt-c)
#     → per-platform wheel build (uor_addr_c.<ext> bundled into the
#       Python package)
#     → twine upload per wheel
#
# All publishing steps are idempotent: each skips the upload when the
# corresponding version is already on the registry. Re-running a
# partially-failed release picks up where it left off.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  release:
    name: crates.io + GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: thumbv7em-none-eabihf, wasm32-unknown-unknown

      - name: Ensure no_std + wasm targets are installed
        # Belt-and-suspenders: explicit `rustup target add` in case
        # dtolnay/rust-toolchain's `targets:` field doesn't surface
        # them. Idempotent.
        run: |
          rustup target add thumbv7em-none-eabihf
          rustup target add wasm32-unknown-unknown

      # wasm-tools componentizes the wasm32-unknown-unknown core module
      # into a zero-import Component Model component (see below). Prebuilt
      # binary install — no compile.
      - name: Install wasm-tools
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-tools

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Validate tag matches uor-addr version
        # The tag `vX.Y.Z` must match each crate's `version = "X.Y.Z"`.
        # uor-addr is the leaf; its version drives the release.
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          CORE_VERSION="$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | select(.name == "uor-addr") | .version')"
          if [ "$TAG" != "$CORE_VERSION" ]; then
            echo "::error::Tag version ($TAG) does not match uor-addr Cargo.toml version ($CORE_VERSION)"
            exit 1
          fi
          echo "Tag v$TAG matches uor-addr version $CORE_VERSION"

      - name: Validate uor-addr-c version matches tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          C_VERSION="$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | select(.name == "uor-addr-c") | .version')"
          if [ "$TAG" != "$C_VERSION" ]; then
            echo "::error::Tag version ($TAG) does not match uor-addr-c Cargo.toml version ($C_VERSION)"
            exit 1
          fi
          echo "Tag v$TAG matches uor-addr-c version $C_VERSION"

      - name: Validate uor-addr-wasm version matches tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          W_VERSION="$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | select(.name == "uor-addr-wasm") | .version')"
          if [ "$TAG" != "$W_VERSION" ]; then
            echo "::error::Tag version ($TAG) does not match uor-addr-wasm Cargo.toml version ($W_VERSION)"
            exit 1
          fi
          echo "Tag v$TAG matches uor-addr-wasm version $W_VERSION"

      - name: Validate npm binding version matches tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          NPM_VERSION="$(jq -r '.version' bindings/npm/package.json)"
          if [ "$TAG" != "$NPM_VERSION" ]; then
            echo "::error::Tag version ($TAG) does not match bindings/npm/package.json version ($NPM_VERSION)"
            exit 1
          fi
          echo "Tag v$TAG matches npm binding version $NPM_VERSION"

      - name: Validate PyPI binding version matches tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PY_VERSION="$(grep '^version' bindings/python/pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          if [ "$TAG" != "$PY_VERSION" ]; then
            echo "::error::Tag version ($TAG) does not match bindings/python/pyproject.toml version ($PY_VERSION)"
            exit 1
          fi
          echo "Tag v$TAG matches Python binding version $PY_VERSION"

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run workspace tests
        run: cargo test --workspace --exclude uor-addr-wasm

      - name: Embedded build (uor-addr, no_std + no_alloc)
        run: cargo build -p uor-addr --no-default-features --target thumbv7em-none-eabihf

      - name: Embedded build (uor-addr-c, no_std + no_alloc)
        run: cargo build -p uor-addr-c --no-default-features --target thumbv7em-none-eabihf

      # Build the core module for wasm32-unknown-unknown (zero host
      # imports) and componentize it. We deliberately avoid wasm32-wasip2:
      # that target links std's WASI runtime into the component even
      # though this pure-compute library never calls it, forcing every
      # host to provision WASI 0.2 and breaking the jco/browser path. The
      # resulting component imports nothing and is consumable everywhere
      # (wasmtime, jco, browsers) with no adapter.
      - name: WASM Component Model build (uor-addr-wasm)
        run: |
          cargo build -p uor-addr-wasm --target wasm32-unknown-unknown --release
          wasm-tools component new \
            target/wasm32-unknown-unknown/release/uor_addr_wasm.wasm \
            -o target/uor_addr_wasm.wasm
          echo "component imports (expect none):"
          wasm-tools component wit target/uor_addr_wasm.wasm | grep -i import || echo "  (zero imports — confirmed)"

      - name: Build documentation
        env:
          RUSTDOCFLAGS: "-D rustdoc::broken_intra_doc_links"
        run: cargo doc --workspace --no-deps

      # Dry-run packaging verification for the leaf crate only. Its
      # dependencies (uor-prism, uor-foundation) are already on
      # crates.io, so `cargo package` resolves cleanly. The dependent
      # crates (uor-addr-c, uor-addr-wasm) carry a `{ path, version }`
      # dep on uor-addr; on a first-ever release that version is not
      # yet on the registry, so `cargo publish --dry-run` for them
      # fails with "no matching package named `uor-addr`". They cannot
      # be dry-run-verified before uor-addr is published — their real
      # publish steps below (after uor-addr is published + index-
      # confirmed) are the authoritative verification.
      - name: Verify packaging — uor-addr
        run: cargo publish --dry-run --allow-dirty -p uor-addr

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            UOR-ADDR release ${{ github.ref_name }}.

            **Rust crates** (published to crates.io in dependency order):
            - [`uor-addr`](https://crates.io/crates/uor-addr) — the core Rust crate; `no_std` + `no_alloc` by default. Six format realizations, three schema-pinned descendants, two cost-model variants.
            - [`uor-addr-c`](https://crates.io/crates/uor-addr-c) — C ABI bindings (`extern "C"` + cbindgen header); builds on hosted + `thumbv7em-none-eabihf`.
            - [`uor-addr-wasm`](https://crates.io/crates/uor-addr-wasm) — WASM Component Model bindings via `wit-bindgen`; consumable from any language with a wasm runtime.

            **Language bindings**:
            - [`@uor-foundation/uor-addr`](https://www.npmjs.com/package/@uor-foundation/uor-addr) (npm) — wraps the WASM Component Model artifact via `jco`.
            - [`uor-addr`](https://pypi.org/project/uor-addr/) (PyPI) — wraps the C ABI via `ctypes`; per-platform wheels.

            **Release artifacts** (attached below):
            - `uor_addr_wasm.wasm` — Component Model artifact.
            - `uor_addr.h` — auto-generated C header.
            - `libuor_addr_c-*.{so,dylib,dll}` — per-platform native libraries.

            All distribution targets produce the same 71-byte ASCII `sha256:<64hex>` κ-label byte-for-byte. Architecture documented in [ARCHITECTURE.md](https://github.com/UOR-Foundation/uor-addr/blob/main/ARCHITECTURE.md); conformance contract in [CONFORMANCE.md](https://github.com/UOR-Foundation/uor-addr/blob/main/CONFORMANCE.md); V&V gate at [VERIFICATION.md](https://github.com/UOR-Foundation/uor-addr/blob/main/VERIFICATION.md).

      - name: Publish uor-addr to crates.io
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if curl -sSf -H "User-Agent: UOR-Addr-release-workflow" \
               "https://crates.io/api/v1/crates/uor-addr/$VERSION" 2>/dev/null \
               | grep -q "\"num\":\"$VERSION\""; then
            echo "uor-addr $VERSION already published; skipping"
          else
            cargo publish -p uor-addr
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for uor-addr on registry
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Waiting for uor-addr $VERSION on registry..."
          for i in {1..60}; do
            if curl -sSf \
                 -H "User-Agent: UOR-Addr-release-workflow" \
                 "https://crates.io/api/v1/crates/uor-addr/$VERSION" \
                 | grep -q "\"num\":\"$VERSION\""; then
              echo "uor-addr $VERSION visible on registry"
              exit 0
            fi
            echo "Waiting for uor-addr $VERSION ($i/60)..."
            sleep 5
          done
          echo "::error::Timed out waiting for uor-addr"
          exit 1

      - name: Publish uor-addr-c to crates.io
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if curl -sSf -H "User-Agent: UOR-Addr-release-workflow" \
               "https://crates.io/api/v1/crates/uor-addr-c/$VERSION" 2>/dev/null \
               | grep -q "\"num\":\"$VERSION\""; then
            echo "uor-addr-c $VERSION already published; skipping"
          else
            cargo publish -p uor-addr-c
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish uor-addr-wasm to crates.io
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if curl -sSf -H "User-Agent: UOR-Addr-release-workflow" \
               "https://crates.io/api/v1/crates/uor-addr-wasm/$VERSION" 2>/dev/null \
               | grep -q "\"num\":\"$VERSION\""; then
            echo "uor-addr-wasm $VERSION already published; skipping"
          else
            cargo publish -p uor-addr-wasm
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Attach uor_addr_wasm.wasm to release
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            target/uor_addr_wasm.wasm \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach uor_addr.h to release
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            crates/uor-addr-c/include/uor_addr.h \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  prebuilt-c:
    name: Prebuilt C ABI library — ${{ matrix.label }}
    needs: release
    runs-on: ${{ matrix.os }}
    # Linux builds run *inside* the manylinux_2_28 container so the
    # produced `.so` only links against glibc 2.28. This makes both
    # (a) the GitHub Release `.so` widely compatible across Linux
    # distros (CentOS 8 / Ubuntu 18.10+ / Debian 10+) and (b) the
    # bundled-in-wheel `.so` `auditwheel repair`-able to the
    # `manylinux_2_28_*` tag PyPI accepts.
    #
    # manylinux_2_28 (AlmaLinux 8) is the oldest manylinux image whose
    # glibc (2.28) can run `actions/checkout@v4`'s Node 20 binary —
    # manylinux2014 (CentOS 7, glibc 2.17) cannot, which is why the
    # first attempt failed with `GLIBC_2.28 not found`. aarch64 builds
    # run on a native `ubuntu-24.04-arm` runner (no QEMU) so the
    # aarch64 container runs natively. macOS / Windows use their
    # native runners directly.
    container: ${{ matrix.container || null }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            container: quay.io/pypa/manylinux_2_28_x86_64
            rust_target: x86_64-unknown-linux-gnu
            artifact: libuor_addr_c.so
            label: linux-x86_64
            ext: so
          - os: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
            rust_target: aarch64-unknown-linux-gnu
            artifact: libuor_addr_c.so
            label: linux-aarch64
            ext: so
          - os: macos-latest
            rust_target: x86_64-apple-darwin
            artifact: libuor_addr_c.dylib
            label: macos-x86_64
            ext: dylib
          - os: macos-latest
            rust_target: aarch64-apple-darwin
            artifact: libuor_addr_c.dylib
            label: macos-aarch64
            ext: dylib
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            artifact: uor_addr_c.dll
            label: windows-x86_64
            ext: dll
    steps:

      - uses: actions/checkout@v4

      - name: Install rustup in manylinux container
        if: matrix.container
        shell: bash
        run: |
          set -euxo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain (host runner)
        if: matrix.container == ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Ensure target installed
        shell: bash
        run: |
          rustup target add ${{ matrix.rust_target }} || true

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.rust_target }}

      - name: Build uor-addr-c (${{ matrix.rust_target }})
        shell: bash
        env:
          # The repo `.cargo/config.toml` pins
          # `aarch64-unknown-linux-gnu` to the cross-linker
          # `aarch64-linux-gnu-gcc` (for local x86_64 → aarch64
          # cross-builds). On the native `ubuntu-24.04-arm` runner the
          # manylinux_2_28_aarch64 container builds aarch64 directly,
          # where that cross-linker does not exist — override it with
          # the container's native `cc`. The env var only governs the
          # aarch64-gnu target, so it is inert on the x86_64 / macOS /
          # Windows matrix legs.
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: cc
        run: cargo build -p uor-addr-c --release --target ${{ matrix.rust_target }}

      # Upload only as a workflow artifact. GitHub Release attachment
      # is centralized in the `attach-prebuilts` job below, which runs
      # on a normal runner with the `gh` CLI available — the manylinux
      # container has no `gh`, so a per-job `gh release upload` here
      # would fail on the Linux legs. `actions/upload-artifact` is a
      # Node action and runs fine inside the glibc-2.28 container.
      - name: Upload to workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prebuilt-c-${{ matrix.label }}
          path: target/${{ matrix.rust_target }}/release/${{ matrix.artifact }}
          if-no-files-found: error

  attach-prebuilts:
    name: Attach C ABI prebuilts to GitHub Release
    needs: prebuilt-c
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all prebuilt artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: prebuilt-c-*
          path: prebuilts
      - name: Stage + attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p staged
          # download-artifact lays artifacts out as
          # prebuilts/prebuilt-c-<label>/<libfile>. Rename each to the
          # release-asset convention libuor_addr_c-<label>-<tag>.<ext>.
          for dir in prebuilts/prebuilt-c-*; do
            label="${dir##*/prebuilt-c-}"
            file="$(ls "$dir")"
            ext="${file##*.}"
            cp "$dir/$file" "staged/libuor_addr_c-${label}-${GITHUB_REF_NAME}.${ext}"
          done
          ls -la staged/
          # `--repo` is required: this job has no `actions/checkout`,
          # so `gh` cannot infer the repository from a local git
          # remote (there is no `.git` directory).
          gh release upload "$GITHUB_REF_NAME" staged/* --clobber --repo "$GITHUB_REPOSITORY"

  publish-npm:
    name: Publish @uor-foundation/uor-addr to npm
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - uses: Swatinem/rust-cache@v2

      # Build the WASM core module for wasm32-unknown-unknown (not
      # wasm32-wasip2). The wasip2 target links std's WASI runtime into
      # the component; jco can only satisfy those imports with the
      # Node-only preview2-shim, making the npm package unusable in the
      # browser / Deno / Bun / Workers / bundlers. The unknown-unknown
      # core module has zero host imports — bindings/npm/scripts/build.mjs
      # componentizes it and inlines the wasm into a single universal ES
      # module.
      - name: Build WASM core module (wasm32-unknown-unknown)
        run: cargo build -p uor-addr-wasm --target wasm32-unknown-unknown --release

      - name: Install npm deps
        working-directory: bindings/npm
        run: npm ci || npm install

      - name: jco-transpile + smoke test
        working-directory: bindings/npm
        run: |
          npm run build
          npm test

      - name: Skip-if-already-published
        id: check
        working-directory: bindings/npm
        run: |
          set -euo pipefail
          VERSION="$(jq -r '.version' package.json)"
          if npm view "@uor-foundation/uor-addr@$VERSION" version 2>/dev/null \
               | grep -q "^$VERSION$"; then
            echo "@uor-foundation/uor-addr@$VERSION already published; skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: npm publish (with provenance)
        if: steps.check.outputs.skip != 'true'
        working-directory: bindings/npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Build per-platform wheels (no publish here) ──────────────────
  #
  # Each leg builds + repairs its wheel and uploads it as a workflow
  # artifact. Publishing is centralized in `publish-pypi` below: the
  # `pypa/gh-action-pypi-publish` action is a Linux-x86_64 Docker
  # action and cannot run on arm64 (exec format error), Windows (no
  # Linux Docker), or macOS — so the upload must happen from a single
  # x86_64 Linux job after all wheels are built.
  build-wheels:
    name: Build wheel — ${{ matrix.label }}
    needs: prebuilt-c
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write   # `gh release upload` of the built wheel
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    label: linux-x86_64,   artifact: libuor_addr_c.so,    repair: auditwheel }
          - { os: ubuntu-24.04-arm, label: linux-aarch64,  artifact: libuor_addr_c.so,    repair: auditwheel }
          # Both macOS wheels build on macos-latest (Apple Silicon).
          # The x86_64 wheel is cross-built: the prebuilt-c step
          # already produced an x86_64 dylib (cross-compiled on the
          # arm64 runner), and `_PYTHON_HOST_PLATFORM` forces the wheel
          # tag to macosx_11_0_x86_64 regardless of the build host's
          # arch. Its native smoke test is skipped (an arm64 runner
          # can't load x86_64 Python without Rosetta gymnastics); the
          # arm64 wheel's smoke test + the Linux/Windows smoke tests
          # already exercise the ctypes wrapper logic. macos-13 Intel
          # runners are not reliably schedulable, so this avoids them.
          - { os: macos-latest,     label: macos-x86_64,   artifact: libuor_addr_c.dylib, repair: none, macos_target: '11.0', host_platform: 'macosx-11.0-x86_64' }
          - { os: macos-latest,     label: macos-aarch64,  artifact: libuor_addr_c.dylib, repair: none, macos_target: '11.0' }
          - { os: windows-latest,   label: windows-x86_64, artifact: uor_addr_c.dll,      repair: none }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download prebuilt library
        uses: actions/download-artifact@v4
        with:
          name: prebuilt-c-${{ matrix.label }}
          path: bindings/python/uor_addr/

      - name: Verify staged library
        shell: bash
        run: |
          set -euxo pipefail
          ls -la bindings/python/uor_addr/
          test -f "bindings/python/uor_addr/${{ matrix.artifact }}"

      - name: Install build + wheel tooling
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip build wheel
          # Linux wheels are rebranded to manylinux via auditwheel.
          # macOS + Windows wheels need no repair: the bundled
          # libuor_addr_c.{dylib,dll} is a self-contained Rust cdylib
          # with no external dynamic-library dependencies to bundle,
          # and the platform tag is set correctly at build time
          # (MACOSX_DEPLOYMENT_TARGET on macOS; win_amd64 on Windows).
          case "${{ matrix.repair }}" in
            auditwheel) python -m pip install --upgrade auditwheel ;;
            none)       ;;
          esac

      - name: Install patchelf (Linux only; required by auditwheel)
        if: matrix.repair == 'auditwheel'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y patchelf

      - name: Build platform wheel
        working-directory: bindings/python
        shell: bash
        env:
          # macOS deployment target — sets the lowest macOS version
          # the wheel claims compatibility with; pip uses this when
          # picking wheels at install time.
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_target }}
          HOST_PLATFORM: ${{ matrix.host_platform }}
        run: |
          set -euo pipefail
          # Cross-build tag override (macos-x86_64 leg only). Export
          # `_PYTHON_HOST_PLATFORM` ONLY when non-empty — an *empty*
          # value blanks the wheel's platform tag entirely (yields the
          # invalid `uor_addr-…-py3-none-.whl`), so we must not set it
          # on the native legs.
          if [ -n "${HOST_PLATFORM}" ]; then
            export _PYTHON_HOST_PLATFORM="${HOST_PLATFORM}"
          fi
          # `setup.py` overrides `bdist_wheel.get_tag()` + sets
          # `has_ext_modules` so the wheel comes out
          # `py3-none-<plat>` (platform-tagged, Python-version-
          # agnostic). No file rename needed.
          python -m build --wheel --outdir dist
          ls -la dist/

      - name: Repair wheel — auditwheel (Linux → manylinux_2_28)
        if: matrix.repair == 'auditwheel'
        working-directory: bindings/python
        run: |
          set -euo pipefail
          # The prebuilt-c container built libuor_addr_c.so against
          # glibc 2.28, so auditwheel rebrands the wheel to the
          # `manylinux_2_28_<arch>` policy. Output replaces the
          # linux_* tag with manylinux_2_28_* in both the filename and
          # `.dist-info/WHEEL`.
          orig=$(ls dist/uor_addr-*-py3-none-linux_*.whl)
          python -m auditwheel repair "$orig" -w dist-repaired/
          rm -f "$orig"
          mv dist-repaired/*.whl dist/
          rmdir dist-repaired
          ls -la dist/

      - name: Smoke test wheel (cross-OS)
        shell: bash
        # Runs natively on every leg except macos-x86_64, which is
        # cross-built on the arm64 runner — an arm64 host can't load
        # x86_64 Python to exercise it. The arm64 macOS wheel + the
        # Linux/Windows wheels already smoke-test the ctypes wrapper;
        # the cross-built dylib itself comes from the same source as
        # the (tested) arm64 build.
        if: matrix.host_platform == ''
        run: |
          set -euo pipefail
          python -m venv smoke_env
          if [ -d smoke_env/bin ]; then
            VENV_PY="smoke_env/bin/python"
          else
            VENV_PY="smoke_env/Scripts/python"
          fi
          "$VENV_PY" -m pip install --no-deps bindings/python/dist/*.whl
          "$VENV_PY" - <<'PY'
          from uor_addr import kappa
          label = kappa.json_address(b'{"foo":"bar"}')
          assert label == 'sha256:7a38bf81f383f69433ad6e900d35b3e2385593f76a7b7ab5d4355b8ba41ee24b', f'unexpected: {label}'
          print(f'wheel smoke ok: {label}')
          # Also exercise the TC-05 witness surface.
          with kappa.json_address_with_witness(b'{"foo":"bar"}') as g:
              assert g.verify() == g.kappa_label(), 'TC-05 round-trip failed'
              print('TC-05 wheel smoke ok')
          PY

      - name: Upload wheel to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            bindings/python/dist/*.whl \
            --clobber --repo "$GITHUB_REPOSITORY"

      - name: Upload wheel as workflow artifact (for publish-pypi)
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.label }}
          path: bindings/python/dist/*.whl
          if-no-files-found: error

  # ── Publish all wheels to PyPI from one x86_64 Linux job ─────────
  publish-pypi:
    name: Publish uor-addr to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    # The environment name must match the PyPI trusted-publisher
    # configuration exactly — the OIDC token GitHub mints carries this
    # environment as a claim, and PyPI rejects the upload if it does
    # not match the registered publisher.
    environment: uor-addr
    permissions:
      id-token: write   # required for PyPI trusted publishing
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true
      - name: List wheels
        run: ls -la dist/
      - name: Publish to PyPI (trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
