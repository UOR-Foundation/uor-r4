[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "uor-addr"
version = "0.2.0"
description = "Typed content-addressing — deterministic, verifiable sha256:<64hex> κ-labels from JSON / S-expressions / XML / ASN.1 DER / schema.org / in-toto. Wraps the uor-addr-c native library via ctypes."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "The UOR Foundation", email = "engineering@uor.foundation" }]
keywords = [
    "uor",
    "content-addressing",
    "sha256",
    "kappa-label",
    "canonicalization",
    "jcs",
    "json",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security :: Cryptography",
    "Topic :: Software Development :: Libraries",
]
# No external Python dependencies — ctypes is in the stdlib. The
# native library is bundled per-platform in the wheel.
dependencies = []

[project.urls]
Homepage = "https://github.com/UOR-Foundation/uor-addr"
Repository = "https://github.com/UOR-Foundation/uor-addr"
Issues = "https://github.com/UOR-Foundation/uor-addr/issues"
"Source (Python binding)" = "https://github.com/UOR-Foundation/uor-addr/tree/main/bindings/python"

[tool.setuptools]
package-dir = { "" = "." }
include-package-data = true

[tool.setuptools.packages.find]
where = ["."]
include = ["uor_addr*"]

[tool.setuptools.package-data]
# The release-workflow stages the right per-platform library here
# before building the wheel (see .github/workflows/release.yml).
uor_addr = ["libuor_addr_c.so", "libuor_addr_c.dylib", "uor_addr_c.dll"]
