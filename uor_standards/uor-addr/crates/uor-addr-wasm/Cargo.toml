[package]
name              = "uor-addr-wasm"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
rust-version.workspace = true
description   = "WASM Component Model bindings for uor-addr via wit-bindgen — polyglot κ-label minting consumable from any language with a Wasm runtime."
documentation = "https://docs.rs/uor-addr-wasm"
readme        = "README.md"
keywords      = ["uor", "content-addressing", "wasm", "component-model", "wit"]
categories    = ["wasm", "cryptography"]

[lib]
crate-type = ["cdylib", "rlib"]
name       = "uor_addr_wasm"

[dependencies]
# Re-uses uor-addr's `alloc` feature: the WASM Component Model lists
# (`list<u8>`, `string`) are realised as `Vec<u8>` / `String` in
# generated Rust glue, so an allocator is required at the binding
# layer. The underlying uor-addr pipeline remains no_alloc — only the
# input/output marshalling allocates.
uor-addr         = { workspace = true, features = ["alloc", "gguf", "onnx"] }
# The `grounded.verify()` Component Model export replays the witness's
# owned `Trace<256>` via `uor_addr::AddressWitness::verify` (ADR-060),
# which re-certifies through `prism::replay::certify_from_trace`
# internally — so `uor-addr` is the only runtime dependency the binding
# needs (the TC-05 commitment; see CL-R* in CONFORMANCE.md).
wit-bindgen      = { version = "0.34", default-features = false, features = ["macros"] }
