[package]
name              = "uor-addr-c"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
rust-version.workspace = true
description   = "C ABI bindings for uor-addr — typed content-addressing exposed over `extern \"C\"` for embedded and any-language consumption."
documentation = "https://docs.rs/uor-addr-c"
readme        = "README.md"
keywords      = ["uor", "content-addressing", "ffi", "c-abi", "no-std"]
categories    = ["external-ffi-bindings", "cryptography", "no-std"]

[lib]
crate-type = ["staticlib", "cdylib", "rlib"]
name       = "uor_addr_c"

[dependencies]
# `default-features = false` is inherited from the workspace dep
# declaration; this crate activates `uor-addr`'s `std` / `alloc`
# features through its own feature graph (see `[features]` below).
uor-addr = { workspace = true }
# The `uor_addr_grounded_verify` C ABI export delegates to the owned
# `uor_addr::AddressWitness::verify` (ADR-060), which re-certifies through
# `prism::replay::certify_from_trace` internally — so `uor-addr` is the
# only runtime dependency the binding needs (the TC-05 round-trip surface,
# CL-R* in CONFORMANCE.md).

[features]
# Hosted targets (linux / macos / windows) default to `std` so the
# cdylib / staticlib outputs pick up `std`'s panic_handler. Bare-metal
# targets (e.g. `thumbv7em-none-eabihf`) build with
# `--no-default-features`: that strips `std`, leaving the in-crate
# `target_os = "none"` panic_handler in scope and the κ-label-only
# functions reachable. The `*_with_witness` / `grounded_*` API requires
# an allocator (handle storage), so it is gated behind `alloc` / `std`.
default = ["std", "gguf", "onnx"]
std     = ["alloc", "uor-addr/std"]
alloc   = ["uor-addr/alloc"]
# GGUF / ONNX realization exports. The underlying realizations
# canonicalize into an `alloc` buffer (skeleton), and their witness
# handles need the allocator, so these axes imply `alloc`.
gguf    = ["alloc", "uor-addr/gguf"]
onnx    = ["alloc", "uor-addr/onnx"]

[build-dependencies]
cbindgen = { version = "0.27", default-features = false }
