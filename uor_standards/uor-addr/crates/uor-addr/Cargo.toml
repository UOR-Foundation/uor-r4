[package]
name              = "uor-addr"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
rust-version.workspace = true
description   = "UOR-ADDR — the typed reference vocabulary for content-addressing across recursively-grammared formats. Standard-library Layer-3 Prism realization of the UOR Foundation; ships the common architectural surface plus the JSON realization under JCS-RFC8785 + NFC + SHA-256."
documentation = "https://docs.rs/uor-addr"
readme        = "README.md"
keywords      = ["uor", "prism", "content-addressing", "verifiable", "no-std"]
categories    = ["cryptography", "data-structures", "no-std"]

[dependencies]
uor-prism          = { workspace = true }
uor-foundation     = { workspace = true }
uor-foundation-sdk = { workspace = true }
# Tensor element-type alphabet for the GGUF / ONNX realizations
# (`prism::tensor::dtype`). Optional — present only when `gguf` or
# `onnx` is enabled. Both realizations import the dtype types and
# `TensorDtypeRegistry` directly; the feature gating keeps the dep
# absent under `--no-default-features` with neither realization on.
uor-prism-tensor   = { workspace = true, optional = true }
# `ryu` — RFC 8785 §3.2.2.3 (ECMA-262 7.1.12.1) shortest-round-trip
# decimal serialization of `f64`. `no_std` + `no_alloc` by default;
# the only pure-Rust dependency the crate needs for canonical-form
# number emission in the JSON realization. Unicode NFC is provided
# by the in-crate [`crate::canonical::nfc`] module (UCD 15.1.0).
ryu = { version = "1", default-features = false }


[features]
# By default, ship the alloc-bearing convenience surface
# (`canonicalize() -> Vec<u8>`, alloc-backed conveniences) on top of
# `std`. The crate's source-of-truth no_alloc surface is reachable
# under `--no-default-features`.
default = ["std", "gguf", "onnx"]
std     = ["alloc", "uor-prism/std"]
# Enable alloc-bearing convenience wrappers on top of the
# no_alloc core. The κ-derivation pipeline is allocator-free
# whether or not this feature is enabled — `alloc` only gates
# convenience surfaces.
alloc   = []
# GGUF realization. Under ADR-060 the canonical form is the full flat
# Merkle skeleton, materialized in an `alloc` buffer (entry sort scratch
# + the skeleton), so the realization requires `alloc`. Activating it
# also pulls in the explicit uor-prism-tensor dep used for the dtype
# registry. (gguf/onnx are off in the bare-metal `--no-default-features`
# build, so the alloc requirement never reaches that target.)
gguf  = ["alloc", "dep:uor-prism-tensor"]
# ONNX realization. Same alloc + dtype-registry discipline.
onnx  = ["alloc", "dep:uor-prism-tensor"]

[dev-dependencies]
# Live HTTP cross-validation against `mcp.uor.foundation/tools/encode_address`
# (CN class — see CONFORMANCE.md). Gated behind `#[ignore]`; runs only under
# `just cn` with UOR_ADDR_LIVE=1.
ureq = { version = "2", features = ["json"] }
# Used only in the gated CN cross-validation test to assemble the HTTP
# request body / parse the response. Not a runtime dependency of the
# crate.
serde_json = "1"
